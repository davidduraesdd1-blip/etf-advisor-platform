name: Nightly analytics precompute

on:
  schedule:
    # 16:00 UTC = 12:00 ET = ~30min before market close. Done well
    # before the 17:00 UTC daily_scanner cron so the two never compete
    # for git push contention. yfinance is also typically less throttled
    # at this time of day (US peak load is later).
    - cron: "0 16 * * *"
  workflow_dispatch:  # manual trigger for ad-hoc refresh

permissions:
  # Required to commit data/etf_analytics.json back to the repo.
  contents: write

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run precompute script
        env:
          # Not strictly required for yfinance, but the universe loader
          # imports modules that may touch EDGAR-related guards.
          EDGAR_CONTACT_EMAIL: ${{ secrets.EDGAR_CONTACT_EMAIL }}
        run: python scripts/precompute_analytics.py

      - name: Commit precomputed snapshot
        run: |
          git config user.name "etf-analytics-bot"
          git config user.email "bot@etf-advisor-platform.invalid"
          if [ -n "$(git status --porcelain data/etf_analytics.json)" ]; then
            git add data/etf_analytics.json
            git commit -m "chore(analytics): nightly precompute — $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No analytics changes — nothing to commit."
          fi
