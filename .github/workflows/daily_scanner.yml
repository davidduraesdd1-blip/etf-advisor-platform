name: Daily ETF scanner

on:
  schedule:
    # 13:00 UTC = 9 AM EST (08:00 EDT during daylight saving). User
    # directive 2026-04-27: scan at 9 AM EST so the FA sees fresh
    # additions before the trading day. EDGAR's full-text index still
    # lags 24-48 hours, so days_back=3 catches everything that landed
    # since the prior scan.
    - cron: "0 13 * * *"
  workflow_dispatch:  # manual trigger for verification + ad-hoc runs

permissions:
  # Required to commit updated data/scanner_health.json back to the repo.
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # We need the full history so the commit step can push a real
          # diff, not a detached HEAD.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily scanner + auto-recalculate portfolios
        env:
          # EDGAR requires an identifiable User-Agent per SEC policy.
          # Set this as a repository secret in GitHub Settings -> Secrets.
          EDGAR_CONTACT_EMAIL: ${{ secrets.EDGAR_CONTACT_EMAIL }}
        run: |
          python - <<'PY'
          import json
          import sys
          from core.etf_universe import daily_scanner, get_scanner_health

          # Step 1: scan EDGAR. add_pending() now auto-classifies each
          # finding (auto_approve / auto_reject / pending). Universe
          # picks up the new ETFs via load_user_additions on next refresh.
          matches = daily_scanner(days_back=3)
          print(f"Scanner found {len(matches)} unique filings.")
          health = get_scanner_health()
          print(f"Health snapshot: {json.dumps(health, indent=2, default=str)}")

          # Step 2: auto-recalculate every demo client's portfolio so
          # the next page render reflects any newly-added ETFs without
          # waiting for cache TTL expiry. User directive 2026-04-27.
          try:
              from core.scheduler import recalculate_all_portfolios
              snapshot = recalculate_all_portfolios()
              print(f"Recalculated {len(snapshot.get('clients', {}))} client portfolios.")
              print(f"Snapshot timestamp: {snapshot.get('timestamp')}")
          except Exception as exc:
              print(f"Auto-rebalance failed (non-fatal): {type(exc).__name__}: {exc}")

          # Non-zero exit if the scanner guard itself raises; anything
          # else (empty result, EDGAR 429, etc.) is logged but not fatal.
          sys.exit(0)
          PY

      - name: Commit scanner-health update
        run: |
          git config user.name "etf-scanner-bot"
          git config user.email "bot@etf-advisor-platform.invalid"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "chore(scanner): daily EDGAR scan — $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes under data/ — nothing to commit."
          fi
