# ETF Advisor Platform — docker-compose.yml
#
# Single service: Streamlit UI. No background scheduler yet (ETF market data
# has slow natural cadence; scheduled scanner added post-demo).
#
# Usage:
#   cp .env.example .env   # fill in keys (empty for local demo mode)
#   docker compose up -d
#
# Update:
#   git pull && docker compose up -d --build

services:
  ui:
    build: .
    command: >
      streamlit run app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
      --server.enableCORS=false
      --server.enableXsrfProtection=false
    restart: unless-stopped
    env_file: .env
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    working_dir: /app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
